<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>PDF Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f1115;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }
  #zoom-controls {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 100;
  }
  #zoom-controls button {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: rgba(35, 41, 55, 0.95);
    color: white;
    font-size: 22px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    transition: background 0.2s;
  }
  #zoom-controls button:hover {
    background: rgba(45, 52, 69, 0.95);
  }
  #zoom-level {
    color: rgba(255,255,255,0.8);
    font-size: 12px;
    font-family: sans-serif;
    text-align: center;
    font-weight: 600;
  }
  #pdf-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 4px 0;
    transform-origin: top center;
  }
  canvas {
    display: block;
    max-width: 100%;
    height: auto;
    pointer-events: none;
  }
  #loading {
    color: white;
    font-family: sans-serif;
    text-align: center;
    padding: 40px 20px;
    font-size: 16px;
  }
</style>
</head>
<body>
<div id="loading">Loading PDF...</div>
<div id="pdf-container"></div>
<div id="zoom-controls">
  <button id="zoom-in" title="Zoom In">+</button>
  <div id="zoom-level">100%</div>
  <button id="zoom-out" title="Zoom Out">−</button>
</div>

<script type="module">
  const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs');
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

  const params = new URLSearchParams(window.location.search);
  const file = params.get('file');
  const startPage = parseInt(params.get('page') || '1', 10);

  let currentZoom = 100;
  let pdfDoc = null;
  const DPR = window.devicePixelRatio || 1;
  const RENDER_SCALE = Math.max(DPR, 2); // High quality: at least 2x

  async function renderAllPages(zoomPercent) {
    if (!pdfDoc) return;
    const container = document.getElementById('pdf-container');
    container.innerHTML = '';

    const baseScale = window.innerWidth / (await pdfDoc.getPage(1)).getViewport({ scale: 1 }).width;
    const userScale = (zoomPercent / 100) * baseScale;

    for (let i = 1; i <= pdfDoc.numPages; i++) {
      const page = await pdfDoc.getPage(i);
      // Render at high resolution
      const hiResViewport = page.getViewport({ scale: userScale * RENDER_SCALE });
      // Display at normal size
      const displayViewport = page.getViewport({ scale: userScale });

      const canvas = document.createElement('canvas');
      canvas.width = hiResViewport.width;
      canvas.height = hiResViewport.height;
      canvas.style.width = displayViewport.width + 'px';
      canvas.style.height = displayViewport.height + 'px';
      container.appendChild(canvas);

      const ctx = canvas.getContext('2d');
      await page.render({
        canvasContext: ctx,
        viewport: hiResViewport
      }).promise;
    }

    // Scroll to requested page on first load
    if (zoomPercent === 100 && startPage > 1 && container.children[startPage - 1]) {
      container.children[startPage - 1].scrollIntoView();
    }

    document.getElementById('zoom-level').textContent = zoomPercent + '%';
  }

  if (!file) {
    document.getElementById('loading').textContent = 'No PDF file specified.';
  } else {
    try {
      pdfDoc = await pdfjsLib.getDocument(file).promise;
      document.getElementById('loading').style.display = 'none';
      await renderAllPages(currentZoom);
    } catch (err) {
      document.getElementById('loading').textContent = 'Failed to load PDF.';
      console.error(err);
    }
  }

  // Zoom controls
  document.getElementById('zoom-in').addEventListener('click', () => {
    if (currentZoom < 300) {
      currentZoom += 25;
      renderAllPages(currentZoom);
    }
  });

  document.getElementById('zoom-out').addEventListener('click', () => {
    if (currentZoom > 50) {
      currentZoom -= 25;
      renderAllPages(currentZoom);
    }
  });

  // Disable right-click
  document.addEventListener('contextmenu', e => e.preventDefault());

  // Disable keyboard shortcuts
  document.addEventListener('keydown', e => {
    const key = e.key.toLowerCase();
    if (e.ctrlKey && ['s', 'p', 'u', 'c', 'a'].includes(key)) e.preventDefault();
    if (e.ctrlKey && e.shiftKey && ['i', 'j', 'c'].includes(key)) e.preventDefault();
    if (key === 'f12' || key === 'printscreen') e.preventDefault();
  });

  // Disable drag
  document.addEventListener('dragstart', e => e.preventDefault());
</script>
</body>
</html>
